<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Genome Vault Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="login-shell">
      <section class="panel login-panel">
        <p class="eyebrow">Genome Database Console</p>
        <h1>Sign in</h1>
        <p class="hero-copy">Use your assigned account to access the genome database. Submitter names are filled automatically from your login.</p>
        <form id="login-form" class="form-grid login-grid">
          <label class="wide">
            <span>Username</span>
            <input id="login_username" required autocomplete="username">
          </label>
          <label class="wide">
            <span>Password</span>
            <input id="login_password" type="password" required autocomplete="current-password">
          </label>
          <div class="form-actions wide">
            <button class="primary-button" type="submit">Login</button>
          </div>
        </form>
        <hr class="section-divider">
        <h2>Create User Account</h2>
        <form id="register-form" class="form-grid login-grid">
          <label class="wide">
            <span>Username</span>
            <input id="register_username" required autocomplete="username">
          </label>
          <label class="wide">
            <span>Display Name</span>
            <input id="register_display_name" placeholder="Optional">
          </label>
          <label class="wide">
            <span>Email</span>
            <input id="register_email" type="email" placeholder="Optional">
          </label>
          <label class="wide">
            <span>Password</span>
            <input id="register_password" type="password" required autocomplete="new-password">
          </label>
          <label class="wide">
            <span>Confirm Password</span>
            <input id="register_confirm_password" type="password" required autocomplete="new-password">
          </label>
          <div class="form-actions wide">
            <button class="ghost-button" type="submit">Register as User</button>
          </div>
        </form>
        <p class="field-note">Default admin account: <code>admin</code> / <code>admin123</code>. Change it through environment variables before production use.</p>
      </section>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script>
      const form = document.getElementById("login-form");
      const registerForm = document.getElementById("register-form");
      const toast = document.getElementById("toast");

      function showToast(message, isError = true) {
        toast.textContent = message;
        toast.style.background = isError ? "rgba(166, 54, 42, 0.95)" : "rgba(16, 32, 39, 0.92)";
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 2800);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          username: document.getElementById("login_username").value.trim(),
          password: document.getElementById("login_password").value,
        };
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          showToast(data.error || "Login failed");
          return;
        }
        window.location.href = "/";
      });

      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          username: document.getElementById("register_username").value.trim(),
          display_name: document.getElementById("register_display_name").value.trim(),
          email: document.getElementById("register_email").value.trim(),
          password: document.getElementById("register_password").value,
          confirm_password: document.getElementById("register_confirm_password").value,
        };
        const response = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          showToast(data.error || "Registration failed");
          return;
        }
        registerForm.reset();
        showToast("Registration successful. You can log in now.", false);
      });
    </script>
  </body>
</html>
