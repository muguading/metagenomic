<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Huangpu Pathogen Database Logo</title>
    <style>
      :root {
        --blue: #074b99;
        --blue-deep: #063676;
        --cyan: #19aee7;
        --teal: #10b99f;
        --teal-deep: #038e91;
        --white: #f8fbff;
        --ink: #083b83;
        --muted: #5e6c7e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #ffffff;
        font-family: "Source Sans 3", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .artboard {
        overflow: hidden;
        background: #ffffff;
      }

      .artboard.icon {
        width: 1024px;
        height: 1024px;
        display: grid;
        place-items: center;
      }

      .artboard.brand {
        width: 1200px;
        height: 720px;
        display: flex;
        align-items: center;
        gap: 52px;
        padding: 70px 86px;
      }

      .emblem {
        position: relative;
        flex: 0 0 auto;
        width: 548px;
        aspect-ratio: 1;
        border-radius: 94px;
        overflow: hidden;
        background:
          radial-gradient(circle at 78% 28%, rgba(69, 239, 199, 0.34), transparent 28%),
          linear-gradient(132deg, var(--blue-deep) 0%, var(--blue) 42%, var(--teal-deep) 58%, var(--teal) 100%);
        box-shadow: 0 22px 44px rgba(13, 63, 111, 0.16);
      }

      .icon .emblem {
        width: 800px;
        border-radius: 138px;
      }

      .icon .emblem-scale {
        position: absolute;
        left: 0;
        top: 0;
        width: 548px;
        height: 548px;
        transform: scale(1.4599);
        transform-origin: top left;
      }

      .brand .emblem {
        width: 456px;
        border-radius: 78px;
        box-shadow: 0 22px 44px rgba(13, 63, 111, 0.16);
      }

      .brand .emblem-scale {
        position: absolute;
        left: 0;
        top: 0;
        width: 548px;
        height: 548px;
        transform: scale(0.8321);
        transform-origin: top left;
      }

      .river {
        position: absolute;
        left: 35%;
        top: -6%;
        width: 330px;
        height: 900px;
        background: var(--white);
        clip-path: path("M126 0 C34 64 42 126 132 178 C238 238 244 318 134 386 C42 442 48 510 148 572 C252 638 244 724 126 812 L232 812 C342 724 354 620 232 548 C146 498 146 458 236 400 C354 324 348 212 230 144 C154 100 166 62 294 0 Z");
        filter: drop-shadow(0 4px 9px rgba(0, 45, 80, 0.18));
        z-index: 8;
      }

      .read-lane {
        position: absolute;
        left: 8.5%;
        top: 25%;
        width: 35%;
        height: 37%;
        z-index: 5;
      }

      .read {
        position: absolute;
        height: 12px;
        border-radius: 999px;
        background: var(--white);
        box-shadow: inset 0 -2px 0 rgba(5, 56, 118, 0.22);
      }

      .read.teal {
        background: linear-gradient(90deg, #64d6ee, var(--teal));
      }

      .read.cyan {
        background: linear-gradient(90deg, var(--cyan), #6ed2ff);
      }

      .r1 { left: 0; top: 0; width: 24%; }
      .r2 { left: 30%; top: 0; width: 30%; }
      .r3 { left: 66%; top: 0; width: 25%; }
      .r4 { left: 8%; top: 12%; width: 25%; }
      .r5 { left: 38%; top: 12%; width: 30%; }
      .r6 { left: 70%; top: 12%; width: 22%; }
      .r7 { left: 0; top: 27%; width: 27%; }
      .r8 { left: 34%; top: 27%; width: 29%; }
      .r9 { left: 68%; top: 27%; width: 22%; }
      .r10 { left: 0; top: 42%; width: 45%; }
      .r11 { left: 50%; top: 42%; width: 29%; }
      .r12 { left: 24%; top: 60%; width: 32%; }
      .r13 { left: 61%; top: 60%; width: 26%; }

      .bases {
        position: absolute;
        left: 9%;
        bottom: 34%;
        display: flex;
        gap: 36px;
        color: #71d8e9;
        font-size: 28px;
        font-weight: 850;
        letter-spacing: 0;
        z-index: 5;
      }

      .bars {
        position: absolute;
        left: 8.5%;
        bottom: 22%;
        width: 32%;
        height: 76px;
        display: flex;
        align-items: end;
        gap: 8px;
        z-index: 5;
      }

      .bar {
        width: 12px;
        border-radius: 6px 6px 0 0;
        background: linear-gradient(180deg, #7ee5ff, #2aa6e8);
      }

      .bar.teal {
        background: linear-gradient(180deg, #68ead1, #12b49c);
      }

      .skyline {
        position: absolute;
        left: 47%;
        right: 10%;
        bottom: 15%;
        height: 118px;
        z-index: 4;
        opacity: 0.54;
      }

      .tower {
        position: absolute;
        bottom: 0;
        background: linear-gradient(180deg, #8fe4ff, #1698e3);
      }

      .t1 {
        left: 25%;
        width: 20px;
        height: 112px;
        border-radius: 999px 999px 0 0;
        background: linear-gradient(180deg, #b8f1ff, #28a7e8);
      }

      .t1::before,
      .t1::after {
        content: "";
        position: absolute;
        left: 50%;
        border-radius: 50%;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #b8f1ff, #28a7e8);
      }

      .t1::before {
        top: 22px;
        width: 54px;
        height: 54px;
      }

      .t1::after {
        top: 82px;
        width: 38px;
        height: 38px;
      }

      .t2 {
        left: 44%;
        width: 52px;
        height: 96px;
        clip-path: polygon(50% 0, 82% 18%, 82% 100%, 18% 100%, 18% 18%);
      }

      .t3 {
        left: 58%;
        width: 38px;
        height: 130px;
        clip-path: polygon(46% 0, 58% 0, 72% 100%, 30% 100%);
      }

      .t4 {
        left: 72%;
        width: 66px;
        height: 86px;
        clip-path: polygon(50% 0, 76% 16%, 76% 100%, 24% 100%, 24% 16%);
      }

      .t5 {
        left: 88%;
        width: 32px;
        height: 58px;
      }

      .wave {
        position: absolute;
        left: -7%;
        right: -7%;
        bottom: 2%;
        height: 112px;
        z-index: 7;
      }

      .wave::before,
      .wave::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50% 50% 0 0;
      }

      .wave::before {
        background: linear-gradient(90deg, #2fb9ef, #0b7fd2);
        clip-path: path("M0 70 C150 10 260 36 380 82 C520 136 610 76 742 46 C874 16 954 54 1100 18 L1100 150 L0 150 Z");
      }

      .wave::after {
        top: 16px;
        background: var(--white);
        clip-path: path("M0 62 C166 4 264 32 390 78 C518 125 624 74 744 48 C874 20 960 54 1100 22 L1100 38 C960 70 874 38 744 66 C624 92 518 143 390 96 C264 50 166 22 0 80 Z");
        opacity: 0.96;
      }

      .brand-lockup {
        min-width: 0;
        max-width: 520px;
      }

      .brand .kicker {
        margin: 0 0 24px;
        color: #75859a;
        font-size: 24px;
        font-weight: 760;
        letter-spacing: 6px;
      }

      .brand .cn {
        margin: 0;
        color: var(--ink);
        font-size: 39px;
        font-weight: 900;
        line-height: 1.22;
        letter-spacing: 0;
        max-width: 500px;
      }

      .brand .en {
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 3.5px;
        line-height: 1.35;
      }

      .icon .brand-lockup {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="artboard" class="artboard brand">
      <section class="emblem" aria-hidden="true">
        <div class="emblem-scale">
          <div class="read-lane">
            <span class="read r1"></span>
            <span class="read r2"></span>
            <span class="read r3"></span>
            <span class="read r4"></span>
            <span class="read cyan r5"></span>
            <span class="read r6"></span>
            <span class="read cyan r7"></span>
            <span class="read r8"></span>
            <span class="read teal r9"></span>
            <span class="read teal r10"></span>
            <span class="read cyan r11"></span>
            <span class="read r12"></span>
            <span class="read teal r13"></span>
          </div>
          <div class="bases"><span>A</span><span>C</span><span>G</span><span>T</span></div>
          <div class="bars">
            <span class="bar" style="height: 18px"></span>
            <span class="bar" style="height: 42px"></span>
            <span class="bar" style="height: 58px"></span>
            <span class="bar teal" style="height: 70px"></span>
            <span class="bar" style="height: 36px"></span>
            <span class="bar teal" style="height: 48px"></span>
            <span class="bar" style="height: 40px"></span>
            <span class="bar" style="height: 24px"></span>
            <span class="bar" style="height: 32px"></span>
            <span class="bar" style="height: 28px"></span>
            <span class="bar" style="height: 52px"></span>
            <span class="bar teal" style="height: 60px"></span>
            <span class="bar teal" style="height: 42px"></span>
          </div>
          <div class="skyline">
            <span class="tower t1"></span>
            <span class="tower t2"></span>
            <span class="tower t3"></span>
            <span class="tower t4"></span>
            <span class="tower t5"></span>
          </div>
          <div class="river"></div>
          <div class="wave"></div>
        </div>
      </section>
      <section class="brand-lockup">
        <p class="kicker">HUANGPU CDC</p>
        <h1 class="cn">黄浦区公共卫生病原基因数据库和生物信息学分析系统</h1>
        <p class="en">PATHOGEN GENOMIC DATABASE · BIOINFORMATICS · TRACEBACK</p>
      </section>
    </main>
    <script>
      const mode = new URLSearchParams(window.location.search).get("mode");
      if (mode === "icon") {
        const artboard = document.getElementById("artboard");
        artboard.classList.remove("brand");
        artboard.classList.add("icon");
      }
    </script>
  </body>
</html>
